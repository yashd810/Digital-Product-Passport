name: Security And Smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend-api/package-lock.json
      - run: npm ci
      - run: find Server routes services middleware db helpers tests -name '*.js' -print0 | xargs -0 -n1 node --check
      - run: npm test
      - run: npm audit --audit-level=high

  backend-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dpp_system
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d dpp_system"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/backend-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend-api/package-lock.json
      - run: npm ci
      - name: Boot backend and hit health endpoint
        env:
          NODE_ENV: development
          PORT: 3001
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: dpp_system
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-smoke-secret
          PEPPER_V1: ci-smoke-pepper
          SERVER_URL: http://127.0.0.1:3001
          APP_URL: http://127.0.0.1:3000
          PUBLIC_APP_URL: http://127.0.0.1:3000
          DID_WEB_DOMAIN: www.example.test
        run: |
          node Server/server.js > /tmp/backend-smoke.log 2>&1 &
          backend_pid=$!
          cleanup() {
            kill "$backend_pid" >/dev/null 2>&1 || true
            wait "$backend_pid" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3001/health; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/backend-smoke.log
          exit 1

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f docker-compose.yml config -q
      - run: docker compose -f docker-compose.prod.yml config -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/frontend-app/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run test:contrast
      - run: npm run build

  public-viewer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/public-passport-viewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/public-passport-viewer/package-lock.json
      - run: npm ci
      - run: npm run build
