services:
  frontend-app:
    image: dpp-frontend-app:latest
    build:
      context: ..
      dockerfile: apps/frontend-app/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:?VITE_API_URL is required}"
        VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:?VITE_PUBLIC_VIEWER_URL is required}"
        VITE_MARKETING_URL: "${MARKETING_URL:?MARKETING_URL is required}"
    environment:
      BACKEND_API_UPSTREAM: "${BACKEND_API_UPSTREAM:?BACKEND_API_UPSTREAM is required}"
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    networks:
      - application
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  public-passport-viewer:
    image: dpp-public-passport-viewer:latest
    build:
      context: ..
      dockerfile: apps/public-passport-viewer/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:?VITE_API_URL is required}"
        VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:?VITE_PUBLIC_VIEWER_URL is required}"
        VITE_MARKETING_URL: "${MARKETING_URL:?MARKETING_URL is required}"
    environment:
      BACKEND_API_UPSTREAM: "${BACKEND_API_UPSTREAM:?BACKEND_API_UPSTREAM is required}"
    ports:
      - "127.0.0.1:${PUBLIC_VIEWER_PORT:-3004}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    networks:
      - application
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  marketing-site:
    image: dpp-marketing-site:latest
    build:
      context: ..
      dockerfile: apps/marketing-site/Dockerfile
      args:
        MARKETING_URL: "${MARKETING_URL:?MARKETING_URL is required}"
        MARKETING_APP_URL: "${APP_URL:?APP_URL is required}"
        MARKETING_API_URL: "${SERVER_URL:?SERVER_URL is required}"
    ports:
      - "127.0.0.1:${MARKETING_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - application
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

networks:
  application:
