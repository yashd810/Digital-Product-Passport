services:
  backend-api:
    build:
      context: ..
      dockerfile: apps/backend-api/Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - /etc/dpp/dpp.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: "${DB_HOST:-postgres}"
      DB_PORT: "${DB_PORT:-5432}"
      LOCAL_STORAGE_DIR: /data
      FILES_DIR: /data/passport-files
      REPO_DIR: /data/repository-files
      UPLOADS_DIR: /data/uploads
    volumes:
      - local_storage_data:/data
    restart: unless-stopped
    depends_on:
      - postgres
      - local-storage

  local-storage:
    image: alpine:3.20
    command: sh -c "mkdir -p /data/passport-files /data/repository-files /data/uploads/symbols && tail -f /dev/null"
    volumes:
      - local_storage_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - /etc/dpp/dpp.env
    environment:
      POSTGRES_DB: "${DB_NAME:-dpp}"
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres_temp_restore}"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  local_storage_data:
  postgres_data:
