services:
  backend-api:
    build:
      context: ..
      dockerfile: apps/backend-api/Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - path: ${DPP_ENV_FILE:-/etc/dpp/dpp.env}
        required: false
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: "${DB_HOST:-postgres}"
      DB_PORT: "${DB_PORT:-5432}"
      LOCAL_STORAGE_DIR: /data
      FILES_DIR: /data/passport-files
      REPO_DIR: /data/repository-files
      UPLOADS_DIR: /data/uploads
    volumes:
      - local_storage_data:/data
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - path: ${DPP_ENV_FILE:-/etc/dpp/dpp.env}
        required: false
    environment:
      POSTGRES_DB: "${DB_NAME:-dpp_system}"
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  local_storage_data:
    name: "${LOCAL_STORAGE_VOLUME_NAME:-dpp_local_storage_data}"
    external: true
  postgres_data:
    name: "${POSTGRES_VOLUME_NAME:-dpp_postgres_data}"
    external: true
