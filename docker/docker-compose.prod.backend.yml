services:
  backend-api:
    build:
      context: ..
      dockerfile: apps/backend-api/Dockerfile
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    env_file:
      - path: ${DPP_ENV_FILE:-/etc/dpp/dpp.env}
        required: true
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: "${DB_HOST:-postgres}"
      DB_PORT: "${DB_PORT:-5432}"
      VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:?VITE_PUBLIC_VIEWER_URL is required}"
      LOCAL_STORAGE_DIR: /data
      FILES_DIR: /data/passport-files
      REPO_DIR: /data/repository-files
      UPLOADS_DIR: /data/uploads
    volumes:
      - localStorageData:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    depends_on:
      backend-storage-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - application
      - database
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  backend-storage-init:
    image: alpine:3.24.1@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    command:
      - sh
      - -c
      - >
        install -d -o 1000 -g 1000 -m 0755
        /data/passport-files
        /data/repository-files
        /data/uploads
        /data/uploads/symbols
    volumes:
      - localStorageData:/data
    restart: "no"
    network_mode: none
    security_opt:
      - no-new-privileges:true
    # This one-shot initializer only needs to create/chown the shared data
    # directories before the non-root API starts.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER

  postgres:
    build:
      context: ..
      dockerfile: infra/docker/postgres/Dockerfile
    image: dpp-postgres:18.4-trixie-gosu1.19-go1.26.5
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_NAME:?DB_NAME is required}"
      POSTGRES_USER: "${DB_USER:?DB_USER is required}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - postgresData:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - database
    security_opt:
      - no-new-privileges:true
    # Initialization needs filesystem access, ownership changes, and the final uid/gid drop.
    # PostgreSQL itself runs without effective capabilities after gosu executes it.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

volumes:
  localStorageData:
    # Production volume identities are deliberately required. Falling back to a
    # default here can attach a new empty volume after an environment-file
    # mistake and make persistent data appear to have been wiped.
    name: "${LOCAL_STORAGE_VOLUME_NAME:?LOCAL_STORAGE_VOLUME_NAME is required}"
    external: true
  postgresData:
    name: "${POSTGRES_VOLUME_NAME:?POSTGRES_VOLUME_NAME is required}"
    external: true

networks:
  application:
  database:
    internal: true
