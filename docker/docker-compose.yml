services:
  frontend-app:
    build:
      context: ..
      dockerfile: apps/frontend-app/Dockerfile
      args:
        VITE_API_URL: ""
        VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:?VITE_PUBLIC_VIEWER_URL is required}"
        VITE_MARKETING_URL: "${MARKETING_URL:?MARKETING_URL is required}"
    pull_policy: build
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:8080"
    environment:
      BACKEND_API_UPSTREAM: http://backend-api:3001
    depends_on:
      backend-api:
        condition: service_healthy
    networks:
      - application
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  public-passport-viewer:
    build:
      context: ..
      dockerfile: apps/public-passport-viewer/Dockerfile
      args:
        VITE_API_URL: ""
        VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:?VITE_PUBLIC_VIEWER_URL is required}"
        VITE_MARKETING_URL: "${MARKETING_URL:?MARKETING_URL is required}"
    pull_policy: build
    ports:
      - "127.0.0.1:${PUBLIC_VIEWER_PORT:-3004}:8080"
    environment:
      BACKEND_API_UPSTREAM: http://backend-api:3001
    depends_on:
      backend-api:
        condition: service_healthy
    networks:
      - application
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  backend-api:
    build:
      context: ..
      dockerfile: apps/backend-api/Dockerfile
    pull_policy: build
    ports:
      - "127.0.0.1:${BACKEND_PORT:-3001}:3001"
    env_file:
      - path: ${DPP_ENV_FILE:?DPP_ENV_FILE is required and must point to the external local environment file}
        required: true
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      SERVER_URL: "${SERVER_URL:?SERVER_URL is required}"
      APP_URL: "${APP_URL:?APP_URL is required}"
      VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:?VITE_PUBLIC_VIEWER_URL is required}"
      LOCAL_STORAGE_DIR: /data
      FILES_DIR: /data/passport-files
      REPO_DIR: /data/repository-files
      UPLOADS_DIR: /data/uploads
    volumes:
      - local_storage:/data
    depends_on:
      backend-storage-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - application
      - database
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend-storage-init:
    image: alpine:3.24.1@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    command:
      - sh
      - -c
      - >
        install -d -o 1000 -g 1000 -m 0755
        /data/passport-files
        /data/repository-files
        /data/uploads
        /data/uploads/symbols
    volumes:
      - local_storage:/data
    network_mode: none
    security_opt:
      - no-new-privileges:true
    # This one-shot initializer only needs to create/chown the shared data
    # directories before the non-root API starts.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER

  marketing-site:
    build:
      context: ..
      dockerfile: apps/marketing-site/Dockerfile
      args:
        MARKETING_URL: "${MARKETING_URL:?MARKETING_URL is required}"
        MARKETING_APP_URL: "${APP_URL:?APP_URL is required}"
        MARKETING_API_URL: "${SERVER_URL:?SERVER_URL is required}"
    pull_policy: build
    ports:
      - "127.0.0.1:${MARKETING_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - application
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  postgres:
    build:
      context: ..
      dockerfile: infra/docker/postgres/Dockerfile
    pull_policy: build
    image: dpp-postgres:18.4-trixie-gosu1.19-go1.26.5
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_NAME:?DB_NAME is required}"
      POSTGRES_USER: "${DB_USER:?DB_USER is required}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - database
    security_opt:
      - no-new-privileges:true
    # Initialization needs filesystem access, ownership changes, and the final uid/gid drop.
    # PostgreSQL itself runs without effective capabilities after gosu executes it.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID

volumes:
  local_storage:
    name: "${LOCAL_STORAGE_VOLUME_NAME:-docker_local_storage_data}"
  postgres_data:
    name: "${POSTGRES_VOLUME_NAME:-docker_postgres_data}"

networks:
  application:
  database:
    internal: true
