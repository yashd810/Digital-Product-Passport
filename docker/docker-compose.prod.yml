services:
  frontend-app:
    build:
      context: ..
      dockerfile: apps/frontend-app/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:?VITE_API_URL is required}"
        VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:?VITE_PUBLIC_VIEWER_URL is required}"
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    depends_on:
      backend-api:
        condition: service_healthy

  public-passport-viewer:
    build:
      context: ..
      dockerfile: apps/public-passport-viewer/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:?VITE_API_URL is required}"
        VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:?VITE_PUBLIC_VIEWER_URL is required}"
    ports:
      - "${PUBLIC_VIEWER_PORT:-3004}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    depends_on:
      backend-api:
        condition: service_healthy

  backend-api:
    build:
      context: ..
      dockerfile: apps/backend-api/Dockerfile
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - path: ${DPP_ENV_FILE:-.env.prod}
        required: true
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: "${DB_HOST:-postgres}"
      DB_PORT: "${DB_PORT:-5432}"
      LOCAL_STORAGE_DIR: /data
      FILES_DIR: /data/passport-files
      REPO_DIR: /data/repository-files
      UPLOADS_DIR: /data/uploads
    volumes:
      - local_storage_data:/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  marketing-site:
    build:
      context: ..
      dockerfile: apps/marketing-site/Dockerfile
    ports:
      - "${MARKETING_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  postgres:
    image: postgres:18-alpine
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    env_file:
      - path: ${DPP_ENV_FILE:-.env.prod}
        required: true
    environment:
      POSTGRES_DB: "${DB_NAME:?DB_NAME is required}"
      POSTGRES_USER: "${DB_USER:?DB_USER is required}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD is required}"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    restart: unless-stopped

volumes:
  local_storage_data:
    name: "${LOCAL_STORAGE_VOLUME_NAME:-dpp_local_storage_data}"
    external: true
  postgres_data:
    name: "${POSTGRES_VOLUME_NAME:-dpp_postgres_data}"
    external: true
