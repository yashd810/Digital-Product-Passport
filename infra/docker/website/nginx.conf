server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve static files and legal pages directly
  location ~ \.(html|css|js|json|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
    expires 1h;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA routing fallback for root and dynamic routes
  location / {
    try_files $uri /index.html;
  }

  error_page 404 /index.html;
}
