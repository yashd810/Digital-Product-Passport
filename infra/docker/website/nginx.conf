server {
  listen 8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; upgrade-insecure-requests" always;

	  # HTML should revalidate so deployments and legal copy updates appear promptly.
	  location ~ \.html$ {
	    expires -1;
	    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
	    add_header X-Content-Type-Options "nosniff" always;
	    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	    add_header X-Frame-Options "SAMEORIGIN" always;
	    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
	    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; upgrade-insecure-requests" always;
	    try_files $uri =404;
	  }

	  # Serve static assets directly.
	  location ~ \.(css|js|json|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
	    expires 1h;
	    add_header Cache-Control "public, max-age=3600" always;
	    add_header X-Content-Type-Options "nosniff" always;
	    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; upgrade-insecure-requests" always;
    try_files $uri =404;
  }

	  # SPA routing fallback for root and dynamic routes
	  location / {
	    try_files $uri /index.html;
	    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
	    add_header X-Content-Type-Options "nosniff" always;
	    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
	    add_header X-Frame-Options "SAMEORIGIN" always;
	    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
	    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; upgrade-insecure-requests" always;
	  }

  error_page 404 /index.html;
}
