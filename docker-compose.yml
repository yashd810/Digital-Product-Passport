services:
  frontend-app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 3000"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:3001}"
      VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:-http://localhost:3004}"
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-true}"
    volumes:
      - ./apps/frontend-app:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend-api

  public-passport-viewer:
    image: node:20-alpine
    working_dir: /workspace/apps/public-passport-viewer
    command: sh -c "npm install && npm run start -- --host 0.0.0.0 --port 3004"
    ports:
      - "${PUBLIC_VIEWER_PORT:-3004}:3004"
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:3001}"
      VITE_PUBLIC_VIEWER_URL: "${VITE_PUBLIC_VIEWER_URL:-http://localhost:3004}"
      CHOKIDAR_USEPOLLING: "${CHOKIDAR_USEPOLLING:-true}"
    volumes:
      - .:/workspace
      - public_viewer_node_modules:/workspace/apps/public-passport-viewer/node_modules
    depends_on:
      - backend-api

  backend-api:
    build:
      context: .
      dockerfile: apps/backend-api/Dockerfile
    working_dir: /app
    command: node Server/server.js
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    env_file:
      - path: .env
        required: false
      - path: ./apps/backend-api/.env
        required: false
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      SERVER_URL: "${SERVER_URL:-http://localhost:3001}"
      APP_URL: "${APP_URL:-http://localhost:3000}"
      ASSET_MANAGEMENT_URL: "${ASSET_MANAGEMENT_URL:-http://localhost:3003}"
      LOCAL_STORAGE_DIR: /data
      FILES_DIR: /data/passport-files
      REPO_DIR: /data/repository-files
      UPLOADS_DIR: /data/uploads
      EMAIL_STYLES_PATH: /tmp/email-styles.css
    volumes:
      - ./apps/backend-api:/app
      - ./apps/frontend-app/src/assets/styles/email-styles.css:/tmp/email-styles.css:ro
      - backend_node_modules:/app/node_modules
      - local_storage_data:/data
    depends_on:
      - postgres
      - local-storage

  asset-management:
    image: nginx:1.27-alpine
    ports:
      - "${ASSET_MANAGEMENT_PORT:-3003}:80"
    volumes:
      - ./apps/asset-management:/usr/share/nginx/html:ro
      - ./infra/docker/asset-management/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-api

  marketing-site:
    image: nginx:1.27-alpine
    ports:
      - "${MARKETING_PORT:-8080}:80"
    volumes:
      - ./apps/marketing-site:/usr/share/nginx/html:ro
      - ./infra/docker/website/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  local-storage:
    image: alpine:3.20
    command: sh -c "mkdir -p /data/passport-files /data/repository-files /data/uploads/symbols && tail -f /dev/null"
    volumes:
      - local_storage_data:/data

  postgres:
    image: postgres:18-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_NAME:-dpp_system}"
      POSTGRES_USER: "${DB_USER:-postgres}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-postgres}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  object-storage-dev:
    image: minio/minio:latest
    profiles: ["object-storage"]
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio_data:/data

volumes:
  frontend_node_modules:
  backend_node_modules:
  public_viewer_node_modules:
  local_storage_data:
  postgres_data:
  minio_data:
